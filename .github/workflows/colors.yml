name: Show Team Colors

on:
  pull_request:
    branches: [dev, master]
    paths:
      - "colors/teams.example.json"
      - "tests/display_team_colors.py"
      - ".github/workflows/colors.yml"

jobs:
  color-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt

      - name: Generate team colors image
        run: |
          python ./tests/display_team_colors.py save

      - name: Upload team colors image
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: team_colors.jpg
          archive: false

      - name: Comment on PR with team colors image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --edit-last --create-if-none --body "Team colors changed in this PR! Preview: ![Team Colors](${{ steps.upload.outputs.artifact-url }})"
